
spring:
  application:
    name: LOAN-GATEWAY-SERVICE
  cloud:
    gateway:
      routes:
        - id: customer-service
          uri: lb://CustomerService
          predicates:
            - Path=/customer/**
            
        - id: loan-service
          uri: lb://LoanService
          predicates:
            - Path=/loans/**
            
        - id: demat-account-service
          uri: lb://DematAccountService
          predicates:
            - Path=/demat/** 
           

eureka:
  client:
    register-with-eureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://localhost:8762/eureka
  instance:
    hostname: localhost
    
server:
  port: 8990
  
