server:
  port: 8989   #  

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    hostname: localhost


spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: patient-service
          uri: lb://PATIENT-SERVICE   # SERVICE NAME, NOT PORT
          predicates:
            - Path=/patient/**
        - id: doctor-service
          uri: lb://DOCTOR-SERVICE   # SERVICE NAME, NOT PORT
          predicates:
            - Path=/doctor/**
        - id: appointment-service
          uri: lb://APPOINTMENT-SERVICE   # SERVICE NAME, NOT PORT
          predicates:
            - Path=/appointment/**        